services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      app_mysql:
        condition: service_healthy
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      WWWUSER: "${WWWUSER:-1000}"
      WWWGROUP: "${WWWGROUP:-1000}"
      ALLOW_WORLD_WRITABLE_STORAGE: "${ALLOW_WORLD_WRITABLE_STORAGE:-true}"
      FIX_APP_SOURCE_PERMISSIONS: "${FIX_APP_SOURCE_PERMISSIONS:-true}"
      APP_KEY: base64:Xd0SFur+yaLzDLkZfuAHkYR/kpb9L4wNaX1zXyk5yT8=
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_DEPRECATIONS_CHANNEL: "null"
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: app_mysql
      DB_PORT: "3306"
      DB_DATABASE: inventory
      DB_USERNAME: app_user
      DB_PASSWORD: app_pass
      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      SESSION_ENCRYPT: "false"
      SESSION_PATH: /
      SESSION_COOKIE: inventory_haget_session
      SESSION_DOMAIN: "null"
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MEMCACHED_HOST: 127.0.0.1
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      MAIL_MAILER: log
      MAIL_SCHEME: "null"
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: "2525"
      MAIL_USERNAME: "null"
      MAIL_PASSWORD: "null"
      MAIL_FROM_ADDRESS: hello@example.com
      MAIL_FROM_NAME: Laravel
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ""
      AWS_USE_PATH_STYLE_ENDPOINT: "false"
      VITE_APP_NAME: Laravel
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - build_data:/var/www/html/public/build
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  app_mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  vendor_data:
  build_data:
